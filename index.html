let currentQuestions = [...questions];
let isRandom = false;
let userAnswers = {};
let hardMarks = {};
let showingOnlyHard = false;

function render() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  let lastTopic = '';
  let visibleQuestions = currentQuestions;

  if (showingOnlyHard) {
    visibleQuestions = currentQuestions.filter((q) => hardMarks[questions.indexOf(q)]);
  }

  visibleQuestions.forEach((q, displayIndex) => {
    const originalIndex = questions.indexOf(q);

    if (!isRandom && q.topic !== lastTopic) {
      const topicCount = questions.filter(x => x.topic === q.topic).length;
      const header = document.createElement('div');
      header.className = 'topic-header';
      header.innerHTML = `${q.topic} <span class="topic-counter">${topicCount} vprašanj</span>`;
      container.appendChild(header);
      lastTopic = q.topic;
    }

    const qDiv = document.createElement('div');
    qDiv.className = 'question';
    if (hardMarks[originalIndex]) qDiv.classList.add('marked-hard');

    const isAnswered = userAnswers[originalIndex] !== undefined;
    const selectedAnswer = userAnswers[originalIndex];

    let answersHtml = '';
    q.answers.forEach((a, ai) => {
      let cls = 'answer';
      const letters = ['a', 'b', 'c', 'd'];
      if (isAnswered) {
        if (ai === q.correct) cls += ' correct';
        else if (ai === selectedAnswer) cls += ' incorrect';
      } else if (selectedAnswer === ai) {
        cls += ' selected';
      }
      answersHtml += `<button class="${cls}" onclick="selectAnswer(${originalIndex}, ${ai})" ${isAnswered ? 'disabled' : ''}><span class="marker">${letters[ai]})</span>${a}</button>`;
    });

    const imageHtml = q.image ? `<div class="q-image"><img src="slike_nalog/${q.image}" alt="Slika naloge"></div>` : '';

    qDiv.innerHTML = `
      <div class="q-header">
        <span class="q-number">Vprašanje ${displayIndex + 1}${isRandom ? '' : ` · ${q.topic.split('.')[0]}`}</span>
        <button class="hard-toggle ${hardMarks[originalIndex] ? 'active' : ''}" onclick="toggleHard(${originalIndex})">
          ${hardMarks[originalIndex] ? '⚑ Težko' : '⚑ Označi'}
        </button>
      </div>
      <div class="q-text">${q.q}</div>
      ${imageHtml}
      <div class="answers">${answersHtml}</div>
      <button class="show-explanation" onclick="toggleExplanation(${originalIndex})" ${!isAnswered ? 'disabled style="opacity:0.5;"' : ''}>
        Pokaži razlago
      </button>
      <div class="explanation" id="expl-${originalIndex}">${q.expl}</div>
    `;

    container.appendChild(qDiv);
  });

  updateStats();
}

function selectAnswer(qIndex, ansIndex) {
  if (userAnswers[qIndex] !== undefined) return;
  userAnswers[qIndex] = ansIndex;
  render();
}

function toggleExplanation(qIndex) {
  const el = document.getElementById(`expl-${qIndex}`);
  el.classList.toggle('visible');
}

function toggleHard(qIndex) {
  hardMarks[qIndex] = !hardMarks[qIndex];
  render();
}

function toggleRandom() {
  isRandom = !isRandom;
  if (isRandom) {
    currentQuestions = [...questions].sort(() => Math.random() - 0.5);
  } else {
    currentQuestions = [...questions];
  }
  document.getElementById('randomize-btn').classList.toggle('active', isRandom);
  render();
}

function showOnlyHard() {
  showingOnlyHard = true;
  render();
}

function showAll() {
  showingOnlyHard = false;
  render();
}

function reset() {
  if (!confirm('Resetiraj vse odgovore?')) return;
  userAnswers = {};
  hardMarks = {};
  showingOnlyHard = false;
  isRandom = false;
  currentQuestions = [...questions];
  document.getElementById('randomize-btn').classList.remove('active');
  render();
}

function updateStats() {
  const total = questions.length;
  const answered = Object.keys(userAnswers).length;
  let correct = 0;
  for (const [qi, ai] of Object.entries(userAnswers)) {
    if (questions[qi].correct === ai) correct++;
  }
  const hard = Object.values(hardMarks).filter(Boolean).length;

  document.getElementById('total-count').textContent = total;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('correct-count').textContent = correct;
  document.getElementById('hard-count').textContent = hard;
}

render();
</script>
